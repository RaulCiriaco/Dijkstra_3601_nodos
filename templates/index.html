<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra - Calculadora de Ruta Más Corta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="/static/diagram.js"></script>
    <script src="/static/shortestPath.js"></script>
    <style>
        /* Fondo con gradiente elegante */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        /* Contenedor principal con glassmorphism */
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-top: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Título principal */
        h1 {
            color: #1e3c72;
            font-weight: 700;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 4px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 2px;
        }

        /* Formulario */
        #nodes-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
        }

        .form-label {
            color: #1e3c72;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
            outline: none;
        }

        /* Botones personalizados con gradientes */
        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60, #219a52);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #219a52, #27ae60);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        .btn-info {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .btn-info:hover {
            background: linear-gradient(135deg, #2980b9, #3498db);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        /* Tabla estilizada */
        .table {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin: 25px 0;
        }

        .table-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .table-primary th {
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            padding: 15px;
            border: none;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: rgba(30, 60, 114, 0.05);
        }

        .table td {
            padding: 12px 15px;
            vertical-align: middle;
        }

        .table input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .table input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
            outline: none;
        }

        /* Contenedor del grafo */
        #cy {
            height: 400px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin: 25px 0;
            border: 3px solid white;
        }

        /* Texto del autor */
        center h2 {
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 15px;
            background: rgba(30, 60, 114, 0.9);
            border-radius: 12px;
            display: inline-block;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .d-flex {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                margin: 5px 0;
            }
            
            #cy {
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1>Algoritmo de Dijkstra - Calculadora de Ruta Más Corta</h1>

        <form id="nodes-form" class="mb-4">
            <div class="mb-3">
                <label for="nodes" class="form-label">Número de nodos:</label>
                <input type="number" id="nodes" name="nodes" class="form-control" placeholder="Ej: 3" min="1" required>
            </div>
            <div class="d-flex justify-content-center gap-2">
                <button type="button" class="btn btn-primary" onclick="drawNodes()">Dibujar nodos iniciales</button>
                <button type="button" class="btn btn-success" onclick="addNewNode()">Agregar nodo origen</button>
            </div>
        </form>

        <table id="connections-table" class="table table-striped table-bordered">
            <thead class="table-primary">
                <tr>
                    <th>Nodo origen</th>
                    <th>Nodo destino</th>
                    <th>Distancia</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Filas dinámicas generadas aquí -->
            </tbody>
        </table>

        <div class="d-flex justify-content-center gap-3 my-4">
            <button type="button" class="btn btn-info" onclick="addConnections()">Agregar conexiones al grafo</button>
            <button type="button" class="btn btn-danger" onclick="calculateShortestPath()">Calcular Ruta Más Corta</button>
        </div>

        <div id="cy" class="border p-3 bg-white" style="height: 400px;">
            <!-- Espacio reservado para tu grafo -->
            <p class="text-center text-muted">Aquí va tu grafo</p>
        </div>
        
        <center>
            <h2>Raúl Ciriaco Castillo 3601 - Ing. Sistemas Computacionales</h2>
        </center>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
